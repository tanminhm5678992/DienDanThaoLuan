<style>
    .bl-form-wrap {
        background: rgba(255, 255, 255, 0.02);
        border: 1px solid rgba(255, 255, 255, 0.07);
        border-radius: 14px;
        padding: 1.2rem;
        margin-bottom: 1.5rem;
    }

    .bl-avatar img {
        width: 48px;
        height: 48px;
        border-radius: 50%;
        object-fit: cover;
        border: 2px solid rgba(79, 142, 247, 0.3);
    }

    .bl-username {
        color: #4f8ef7;
        font-size: 0.85rem;
        font-weight: 600;
        margin-top: 0.4rem;
        text-align: center;
    }

    .bl-guest-avatar {
        width: 48px;
        height: 48px;
        border-radius: 50%;
        background: linear-gradient(135deg, rgba(79, 142, 247, 0.2), rgba(167, 139, 250, 0.2));
        border: 2px solid rgba(79, 142, 247, 0.2);
        display: flex;
        align-items: center;
        justify-content: center;
        color: rgba(255, 255, 255, 0.3);
        font-size: 1.3rem;
    }

    .btn-toggle-code {
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.1);
        color: rgba(255, 255, 255, 0.7);
        border-radius: 8px;
        padding: 0.4rem 0.9rem;
        font-size: 0.82rem;
        cursor: pointer;
        transition: all 0.2s;
    }

    .btn-toggle-code:hover {
        background: rgba(79, 142, 247, 0.1);
        border-color: rgba(79, 142, 247, 0.3);
        color: #4f8ef7;
    }

    .codeEditorContainer {
        margin-top: 0.75rem;
    }

    .btn-send {
        background: linear-gradient(135deg, #4f8ef7, #a78bfa);
        border: none;
        color: white;
        padding: 0.5rem 1.4rem;
        border-radius: 8px;
        font-weight: 600;
        font-size: 0.88rem;
        cursor: pointer;
        transition: opacity 0.2s;
        float: right;
    }

    .btn-send:hover {
        opacity: 0.85;
    }
</style>

<div class="bl-form-wrap">
    <div class="row g-0">
        <div class="col-2 d-flex flex-column align-items-center">
            <% if (locals.currentUser) { %>
                <div class="bl-avatar">
                    <img src="/Images/<%= currentUser.AnhDaiDien || 'default-avatar.png' %>" alt="Avatar">
                </div>
                <div class="bl-username">
                    <%= currentUser.TenDangNhap %>
                </div>
                <% } else { %>
                    <div class="bl-guest-avatar"><i class="fas fa-user"></i></div>
                    <div class="bl-username" style="color:rgba(255,255,255,0.3)">Khách</div>
                    <% } %>
        </div>
        <div class="col-10 ps-3">
            <form action="/dien-dan/them-binh-luan" method="POST">
                <% if (locals.errorMessage) { %>
                    <div class="alert alert-danger py-1 px-2 mb-2" style="font-size:0.82rem;">
                        <%= errorMessage %>
                    </div>
                    <% } %>
                        <input type="hidden" name="MaBV" value="<%= MaBV %>">
                        <input type="hidden" name="IDCha" value="">
                        <div class="reply-box">
                            <textarea class="reply-content-text form-control mb-2" name="NoiDung"
                                placeholder="Nhập nội dung bình luận..."
                                style="background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);color:#f0f0f5;border-radius:10px;min-height:80px;resize:vertical;">
                    </textarea>
                            <div class="d-flex align-items-center justify-content-between flex-wrap gap-2">
                                <button type="button" class="btn-toggle-code toggleCodeEditor">
                                    <i class="fas fa-code me-1"></i> Hiển thị/Ẩn Mã Code
                                </button>
                                <button type="submit" class="btn-send">
                                    <i class="fas fa-paper-plane me-1"></i> Gửi
                                </button>
                            </div>
                            <div class="codeEditorContainer" style="display:none;">
                                <textarea name="CodeContent" class="reply-input codeContent"
                                    placeholder="Nhập mã code..."></textarea>
                            </div>
                        </div>
            </form>
        </div>
    </div>
</div>

<%- include('_EditorScripts') %>
